services:
  - type: web
    name: binary-image-qnn
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn BinaryConfig.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: DJANGO_SETTINGS_MODULE
        value: BinaryConfig.settings
      - key: PYTHONPATH
        value: .
